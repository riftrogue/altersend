app-id: com.altersend.AlterSend
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24

command: altersend

build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_UPDATE_NOTIFIER: "false"
    NPM_CONFIG_OFFLINE: "true"
    NPM_CONFIG_CACHE: "/run/build/altersend/flatpak-node/npm-cache"
    FLATPAK_BUILD: "1"
    ELECTRON_BUILDER_CACHE: "/run/build/altersend/apps/desktop/.electron-dist"

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=all
  - --filesystem=~/.config/AlterSend:create

modules:
  - name: altersend
    buildsystem: simple

    build-commands:
      - npm ci --ignore-scripts

      - npm run build -w packages/core
      - npm run build -w packages/locales
      - npm run build -w packages/domain
      - npm run build -w packages/components

      - npm run build -w apps/desktop

      - |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
        (cd apps/desktop && ../../node_modules/.bin/electron-builder --linux --$ARCH --dir \
          -c electron-builder.linux.json --publish never)

      - install -d /app/lib/AlterSend /app/bin
      - cp -a apps/desktop/out/linux-unpacked/. /app/lib/AlterSend/

      - install -Dm755 altersend.sh /app/bin/altersend

      - install -Dm644 flatpak/com.altersend.AlterSend.desktop /app/share/applications/com.altersend.AlterSend.desktop
      - install -Dm644 assets/01-logo-icon-logo-icon-512x512.png /app/share/icons/hicolor/512x512/apps/com.altersend.AlterSend.png
      - install -Dm644 flatpak/com.altersend.AlterSend.metainfo.xml /app/share/metainfo/com.altersend.AlterSend.metainfo.xml

    sources:
      - type: dir
        path: ..

      - type: script
        dest-filename: altersend.sh
        commands:
          - exec zypak-wrapper.sh /app/lib/AlterSend/altersend "$@"

      - node-modules.json

      - type: file
        url: https://github.com/electron/electron/releases/download/v40.10.0/electron-v40.10.0-linux-x64.zip
        sha256: 35efe7401822e8d2e474e13788a6191362c7494dd1f7ae327b70087e0768a667
        dest: apps/desktop/.electron-dist
        dest-filename: electron-v40.10.0-linux-x64.zip
        only-arches:
          - x86_64

      - type: file
        url: https://github.com/electron/electron/releases/download/v40.10.0/electron-v40.10.0-linux-arm64.zip
        sha256: cb4454ae64f00f43cef86f57d38eff9a6cef7b1e0690debc1dc81323f98e6e63
        dest: apps/desktop/.electron-dist
        dest-filename: electron-v40.10.0-linux-arm64.zip
        only-arches:
          - aarch64
