app-id: com.altersend.desktop
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

# Provides zypak (Chromium sandbox shim) and Electron runtime libraries
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

# Provides Node.js 24 + npm during the build phase
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24

command: altersend

build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_UPDATE_NOTIFIER: "false"
    # Ensure npm uses the offline cache
    NPM_CONFIG_OFFLINE: "true"
    NPM_CONFIG_CACHE: "/run/build/altersend/flatpak-node/npm-cache"

finish-args:
  - --share=network        # Hyperswarm P2P discovery and file transfer
  - --socket=wayland       # Wayland display
  - --socket=fallback-x11  # X11 fallback
  - --device=all           # Camera access (QR scanning), includes DRI for GPU
  - --filesystem=home      # File open/save dialogs

modules:
  - name: altersend
    buildsystem: simple

    build-commands:
      # Install dependencies using pre-fetched offline cache
      - npm ci --ignore-scripts

      # Build monorepo packages
      - npm run build -w packages/core
      - npm run build -w packages/locales
      - npm run build -w packages/domain
      - npm run build -w packages/components

      # Build desktop app
      - npm run build -w apps/desktop

      # FLATPAK_BUILD=1: Skips --no-sandbox wrapper in afterPack.cjs (zypak handles sandboxing).
      # ELECTRON_BUILDER_CACHE: Uses pre-fetched electron zip.
      # Architecture is detected dynamically for multi-arch builds.
      - |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
        export FLATPAK_BUILD=1
        export ELECTRON_BUILDER_CACHE=$(pwd)/apps/desktop/.electron-dist
        cd apps/desktop
        ../../node_modules/.bin/electron-builder --linux --$ARCH --dir \
          -c electron-builder.linux.json --publish never

      # Install unpacked app and configure launcher
      - mkdir -p /app/main /app/bin
      - cp -a apps/desktop/out/linux-unpacked/. /app/main/

      # Binary is named @altersenddesktop by electron-builder.
      # zypak-wrapper handles Flatpak sandbox integration.
      - |
        cat > /app/bin/altersend << 'EOF'
        #!/bin/sh
        exec zypak-wrapper.sh /app/main/@altersenddesktop "$@"
        EOF
      - chmod +x /app/bin/altersend

      # Install desktop integration files
      - install -Dm644 flatpak/com.altersend.desktop.desktop /app/share/applications/com.altersend.desktop.desktop
      - install -Dm644 assets/01-logo-icon-logo-icon-512x512.png /app/share/icons/hicolor/512x512/apps/com.altersend.desktop.png
      - install -Dm644 flatpak/com.altersend.desktop.metainfo.xml /app/share/metainfo/com.altersend.desktop.metainfo.xml

    sources:
      - type: dir
        path: ..

      # Generated via: flatpak-node-generator npm package-lock.json -o flatpak/node-modules.json
      - node-modules.json

      # Pre-fetched Electron binary (x86_64)
      - type: file
        url: https://github.com/electron/electron/releases/download/v40.2.1/electron-v40.2.1-linux-x64.zip
        sha256: 69a75d19902c6fd5acb5b37a77ca5762c46cd1811667369e35e9128b17dfb368
        dest: apps/desktop/.electron-dist
        dest-filename: electron-v40.2.1-linux-x64.zip
        only-arches:
          - x86_64

      # Pre-fetched Electron binary (aarch64)
      - type: file
        url: https://github.com/electron/electron/releases/download/v40.2.1/electron-v40.2.1-linux-arm64.zip
        sha256: 5afced5714ae8a8703f7836205d9aa5e816623c51ca80853314623703429426d
        dest: apps/desktop/.electron-dist
        dest-filename: electron-v40.2.1-linux-arm64.zip
        only-arches:
          - aarch64
